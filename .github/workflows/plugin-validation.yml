name: Plugin Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  plugin-validation:
    name: Plugin Layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the submission-readiness check below compares the
          # pinned .source.sha's plugins/agent-guard tree against HEAD, and a
          # shallow (depth 1) checkout cannot resolve that commit. The check
          # fails closed when it cannot verify, so this is required, not an
          # optimisation.
          fetch-depth: 0

      - name: Run tests
        run: make test

      - name: Validate Codex Plugin Layout
        run: scripts/validate-plugin-layout.sh --codex

      - name: Validate Claude Plugin Layout
        run: scripts/validate-plugin-layout.sh --claude

      - name: Validate Plugin Marketplaces
        run: scripts/validate-plugin-layout.sh --marketplace

      - name: Validate Release Archive Layout
        run: scripts/validate-plugin-layout.sh --archive

      - name: Validate Marketplace Submission Readiness
        run: make submission-check
