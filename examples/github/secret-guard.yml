name: Agent Guard

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: JeongJaeSoon/agent-guard@v2
        with:
          paths: "."
          gitleaks-checksum: "<sha256 of the gitleaks release archive>"
