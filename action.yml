name: Agent Guard Secret Guardrails
author: Agent Guard contributors
description: Real-time secret-leak guardrails for AI coding agents (Claude Code, Codex), Git hooks, and CI.
branding:
  icon: shield
  color: green

inputs:
  paths:
    description: Whitespace-separated paths to scan. Because paths are split on
      whitespace, an individual path cannot contain spaces; the default (.) scans
      the whole repository.
    required: false
    default: "."
  gitleaks-version:
    description: Gitleaks version to install if gitleaks is not already available.
    required: false
    default: "8.30.1"
  gitleaks-checksum:
    description: Sha256 checksum for the selected gitleaks archive. Required by default when gitleaks must be installed.
    required: false
    default: ""
  require-checksum:
    description: When true, fail if gitleaks-checksum is empty. Defaults to true so CI
      cannot silently fall back to HTTPS-only integrity. Set to false only for local
      experimentation.
    required: false
    default: "true"
  config-path:
    description: Optional gitleaks config path. Defaults to the bundled Agent Guard config.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Check shell dependencies
      shell: bash
      run: |
        set -euo pipefail
        command -v jq >/dev/null || { echo "jq is required" >&2; exit 2; }
        command -v git >/dev/null || { echo "git is required" >&2; exit 2; }

    - name: Install gitleaks if missing
      shell: bash
      env:
        AGENT_GUARD_GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
        AGENT_GUARD_GITLEAKS_CHECKSUM: ${{ inputs.gitleaks-checksum }}
        AGENT_GUARD_REQUIRE_CHECKSUM: ${{ inputs.require-checksum }}
      run: |
        set -euo pipefail
        if command -v gitleaks >/dev/null; then
          exit 0
        fi

        version="$AGENT_GUARD_GITLEAKS_VERSION"
        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) arch="x64" ;;
          arm64|aarch64) arch="arm64" ;;
          *) echo "unsupported architecture for gitleaks install: $arch" >&2; exit 2 ;;
        esac

        checksum="$AGENT_GUARD_GITLEAKS_CHECKSUM"
        require_checksum="${AGENT_GUARD_REQUIRE_CHECKSUM:-true}"
        if [ -z "$checksum" ] && [ "$require_checksum" = "true" ]; then
          echo "agent-guard: gitleaks-checksum input is required when require-checksum=true" >&2
          echo "  Provide a pinned sha256 for gitleaks ${version} or pass require-checksum=false explicitly." >&2
          exit 2
        fi

        archive="gitleaks_${version}_${os}_${arch}.tar.gz"
        url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
        tmp="$(mktemp -d)"
        curl -fsSL "$url" -o "$tmp/$archive"

        if [ -n "$checksum" ]; then
          echo "$checksum  $tmp/$archive" | shasum -a 256 -c -
        else
          echo "agent-guard: no gitleaks-checksum provided; relying on HTTPS transport only." >&2
        fi

        tar -xzf "$tmp/$archive" -C "$tmp"
        mkdir -p "$RUNNER_TEMP/agent-guard-bin"
        mv "$tmp/gitleaks" "$RUNNER_TEMP/agent-guard-bin/gitleaks"
        chmod +x "$RUNNER_TEMP/agent-guard-bin/gitleaks"
        echo "$RUNNER_TEMP/agent-guard-bin" >> "$GITHUB_PATH"

    - name: Run Agent Guard
      shell: bash
      env:
        AGENT_GUARD_GITLEAKS_CONFIG: ${{ inputs.config-path }}
        AGENT_GUARD_PATHS: ${{ inputs.paths }}
      run: |
        set -euo pipefail
        if [ -z "${AGENT_GUARD_GITLEAKS_CONFIG:-}" ]; then
          unset AGENT_GUARD_GITLEAKS_CONFIG
        fi
        # Split paths from env, not from unquoted YAML-time input expansion.
        # shellcheck disable=SC2086
        "${GITHUB_ACTION_PATH}/plugins/agent-guard/bin/agent-guard" scan-path -- $AGENT_GUARD_PATHS
